<head>

<title>Happy Birthday ♥</title>

<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d0505;overflow:hidden;font-family:'Lato',sans-serif;}
#sc-wrap{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0;overflow:hidden;}
.slide{position:fixed;inset:0;opacity:0;transition:opacity 1.2s ease;pointer-events:none;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0505;}
.slide.active{opacity:1;pointer-events:all;}
.text-slide{text-align:center;padding:0 40px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.text-slide::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(180,120,60,0.1) 0%,transparent 70%);}
.text-slide>*{position:relative;z-index:1;}
.label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#c9a96e;margin-bottom:18px;}
.text-slide h1{font-family:'Playfair Display',serif;font-size:clamp(34px,7vw,60px);color:#fff;line-height:1.25;margin-bottom:24px;}
.text-slide h1 em{color:#c9a96e;font-style:italic;}
.lyric{font-family:'Playfair Display',serif;font-size:15px;color:rgba(255,255,255,0.5);font-style:italic;line-height:1.9;border-left:2px solid #c9a96e;padding-left:18px;text-align:left;max-width:400px;}
.photo-slide{justify-content:center;padding:40px 40px 80px;}
.photos-row{display:flex;gap:14px;align-items:center;justify-content:center;width:100%;max-width:880px;}
.photo-card{flex:1;max-width:260px;border-radius:8px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.7);border:1px solid rgba(201,169,110,0.2);background:#111;aspect-ratio:3/4;}
.photo-card.wide{max-width:360px;}
.photo-card img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.caption-bar{margin-top:22px;text-align:center;}
.cap-main{font-family:'Playfair Display',serif;font-size:clamp(16px,2.5vw,24px);color:#fff;font-style:italic;}
.cap-song{display:block;font-size:9px;color:#c9a96e;letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.concert-slide{display:flex;flex-direction:column;justify-content:center;align-items:center;overflow-y:auto;overflow-x:hidden;padding:20px 20px 80px;position:fixed;inset:0;-webkit-overflow-scrolling:touch;}
.concert-slide::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(180,120,60,0.12) 0%,transparent 65%);pointer-events:none;}
.concert-slide>*{position:relative;z-index:1;}
.ticket{background:#13080a;border:1.5px solid rgba(201,169,110,0.4);border-radius:16px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8),0 0 0 1px rgba(201,169,110,0.1);position:relative;margin:0 auto;}
.ticket-top{padding:22px 24px 18px;border-bottom:1px dashed rgba(201,169,110,0.25);display:flex;flex-direction:column;gap:5px;}
.ticket-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#c9a96e;}
.ticket-artist{font-family:'Playfair Display',serif;font-size:clamp(28px,8vw,48px);color:#fff;line-height:1.05;font-weight:700;}
.ticket-tour{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:2px;}
.ticket-bottom{padding:16px 24px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ticket-field-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;}
.ticket-field-value{font-size:14px;color:#fff;font-weight:400;}
.ticket-field-value.gold{color:#c9a96e;font-family:'Playfair Display',serif;font-style:italic;font-size:16px;}
.ticket-notch-left,.ticket-notch-right{position:absolute;width:20px;height:20px;border-radius:50%;background:#0d0505;top:50%;transform:translateY(-50%);border:1.5px solid rgba(201,169,110,0.4);}
.ticket-notch-left{left:-11px;}
.ticket-notch-right{right:-11px;}
.stars{display:flex;gap:5px;margin-top:3px;}
.star{color:#c9a96e;font-size:9px;}
.concert-message{margin-top:20px;text-align:center;padding:0 10px;}
.concert-message p{font-family:'Playfair Display',serif;font-size:clamp(14px,3.5vw,19px);color:rgba(255,255,255,0.7);font-style:italic;line-height:1.8;}
.concert-message p em{color:#c9a96e;}
.music-bar{position:fixed;top:16px;right:16px;z-index:200;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.65);padding:7px 14px;border-radius:20px;border:0.5px solid rgba(201,169,110,0.35);backdrop-filter:blur(6px);cursor:pointer;}
.bars{display:flex;align-items:flex-end;gap:2px;height:14px;}
.bars span{width:3px;background:#c9a96e;border-radius:1px;animation:bounce 0.8s ease-in-out infinite alternate;}
.bars span:nth-child(1){height:6px;animation-delay:0s}
.bars span:nth-child(2){height:12px;animation-delay:.15s}
.bars span:nth-child(3){height:9px;animation-delay:.3s}
.bars span:nth-child(4){height:14px;animation-delay:.1s}
.bars.paused span{animation-play-state:paused;}
@keyframes bounce{from{transform:scaleY(0.4)}to{transform:scaleY(1)}}
.music-label{font-size:11px;color:rgba(255,255,255,0.75);letter-spacing:.5px;white-space:nowrap;}
.nav-area{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:14px;}
.nav-btn{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.nav-btn:hover{background:rgba(255,255,255,0.2);}
.dots{display:flex;gap:8px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;border:none;padding:0;transition:all .3s;}
.dot.active{background:#c9a96e;width:20px;border-radius:3px;}
